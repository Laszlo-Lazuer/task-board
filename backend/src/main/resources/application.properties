spring.application.name=taskboard
# Use H2 in-memory - perfect for initial prep and testing
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Explicitly set the dialect to prevent the "Unable to determine Dialect" error
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable the console so you can verify the DB at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Actuator
management.endpoints.web.exposure.include=health