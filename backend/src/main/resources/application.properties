spring.application.name=taskboard
spring.datasource.url=jdbc:h2:mem:taskboard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Expose the health endpoint over the web
management.endpoints.web.exposure.include=health

# Show full details to all users (for development/testing; adjust for production security)
management.endpoint.health.show-details=always

# (Optional) Change the base path from /actuator to /
# management.endpoints.web.base-path=/
